name: Release LecturePack

# Manual (workflow_dispatch) build of the Windows installer + portable ZIP +
# SHA256SUMS for a given tag. Releases are published from LOCALLY-verified
# artifacts (build.py runs the release-asset gate) so the published checksums
# always match the exact binaries that were verified — a tag push must not
# trigger a second, non-reproducible rebuild that overwrites them. Trigger this
# manually only when you want CI to (re)build artifacts for a tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.9.0-beta.1)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag matches version.py
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"; TAG="${TAG#v}"
          FILE=$(grep -oP '__version__\s*=\s*"\K[^"]+' app/desktop/version.py)
          echo "tag=$TAG  version.py=$FILE"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag $TAG does not match __version__ $FILE in app/desktop/version.py"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: app
        run: python packaging/build.py

      - name: Extract changelog for this version
        id: notes
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"; TAG="${TAG#v}"
          NOTES_FILE="$RUNNER_TEMP/notes.md"
          if [ -f CHANGELOG.md ]; then
            # Pull the section between "## [<version>]" and the next "## " heading.
            awk -v ver="$TAG" '
              $0 ~ "^## \\[?" ver "\\]?" {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "- Update to v$TAG" > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: LecturePack ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            app/dist/installer/LecturePack-*-Setup.exe
            app/dist/installer/LecturePack-*-Portable.zip
            app/dist/installer/LecturePack-*-SHA256SUMS.txt
          draft: false
          # Tags carrying a pre-release suffix (e.g. -beta.1) publish as a
          # GitHub pre-release so the stable auto-updater channel is unaffected.
          prerelease: ${{ contains(inputs.tag, '-') }}

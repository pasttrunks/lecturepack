name: Release LecturePack

# Push a tag like v1.2.0 → builds the Windows installer and publishes a GitHub
# Release. The in-app auto-updater checks this repo's releases and offers the
# new build with the changelog shown below as the "what's new" overview.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches version.py
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE=$(grep -oP '__version__\s*=\s*"\K[^"]+' app/desktop/version.py)
          echo "tag=$TAG  version.py=$FILE"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag $TAG does not match __version__ $FILE in app/desktop/version.py"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: app
        run: python packaging/build.py

      - name: Extract changelog for this version
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$RUNNER_TEMP/notes.md"
          if [ -f CHANGELOG.md ]; then
            # Pull the section between "## [<version>]" and the next "## " heading.
            awk -v ver="$TAG" '
              $0 ~ "^## \\[?" ver "\\]?" {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "- Update to v$TAG" > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: LecturePack ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            app/dist/installer/LecturePack-Setup-*.exe
            app/dist/installer/LecturePack-*-Portable.zip
            app/dist/installer/LecturePack-*-SHA256SUMS.txt
          draft: false
          # Tags carrying a pre-release suffix (e.g. -beta.1) publish as a
          # GitHub pre-release so the stable auto-updater channel is unaffected.
          prerelease: ${{ contains(github.ref_name, '-') }}
